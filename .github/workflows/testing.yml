# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: testing

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        os: [ubuntu-latest, macOS-latest, windows-latest]

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
    - name: Install package
      run: |
        python -m pip install .[tests]
    - name: Lint with flake8
      run: |
        flake8 examples tests pyriemann setup.py
    - name: Test with pytest
      run: |
        pytest

  torch-utils:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Set up Python 3.11
      uses: actions/setup-python@v2
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
    - name: Install package with torch
      run: |
        python -m pip install .[tests,tests_torch]
    - name: Test torch backend utils
      run: |
        pytest \
          tests/test_utils_base.py \
          tests/test_utils_distance.py \
          tests/test_utils_geodesic.py \
          tests/test_utils_mean.py \
          tests/test_utils_tangentspace.py \
          tests/test_utils_torch_backend.py
